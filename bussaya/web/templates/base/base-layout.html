<!DOCTYPE html>
<html lang="en" data-theme="liberation">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0"/>
    <title>{% block title  %}{{ config.get('APP_TITLE') }}{% endblock %}</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='node_modules/daisyui/daisyui.css') | add_date_url }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/liberation.css') | add_date_url }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='node_modules/@fortawesome/fontawesome-free/css/all.min.css') | add_date_url }}">
    <script src="{{ url_for('static', filename='node_modules/@tailwindcss/browser/dist/index.global.js') | add_date_url }}"></script>
    <style type="text/tailwindcss">
      /* Map Tailwind color utilities (bg-primary, text-base-content, ...) to the
         active daisyUI theme variables defined in css/liberation.css. */
      @theme inline {
        --color-base-100: var(--color-base-100);
        --color-base-200: var(--color-base-200);
        --color-base-300: var(--color-base-300);
        --color-base-content: var(--color-base-content);
        --color-primary: var(--color-primary);
        --color-primary-content: var(--color-primary-content);
        --color-secondary: var(--color-secondary);
        --color-secondary-content: var(--color-secondary-content);
        --color-accent: var(--color-accent);
        --color-accent-content: var(--color-accent-content);
        --color-neutral: var(--color-neutral);
        --color-neutral-content: var(--color-neutral-content);
        --color-info: var(--color-info);
        --color-info-content: var(--color-info-content);
        --color-success: var(--color-success);
        --color-success-content: var(--color-success-content);
        --color-warning: var(--color-warning);
        --color-warning-content: var(--color-warning-content);
        --color-error: var(--color-error);
        --color-error-content: var(--color-error-content);
      }
    </style>

    {% block default_head %}{% endblock %}
    {% block additional_head %}{% endblock %}
  </head>

  <body class="bg-base-200 text-base-content min-h-screen">
    {% block body %}{% endblock %}
  </body>
  {% block additional_js %}{% endblock %}
  {% include "/base/analytic.html" %}
</html>
